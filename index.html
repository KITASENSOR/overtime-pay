<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>加班費計算機</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg-color: #f4f7f6;
            --sat-bg: #fdebd0;
            --sat-border: #f39c12;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        /* 頂部操作區 */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn-setting {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
            text-align: center;
        }

        .btn-setting:hover {
            background: #2980b9;
        }

        .calendar-header {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            padding: 8px;
            background: #ecf0f1;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .calendar-header:hover {
            background: #dfe6e9;
        }
        
        .calendar-header::after {
            content: " ▾";
            font-size: 0.8em;
            color: #7f8c8d;
        }

        .result-box {
            background: #eafaf1;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3em;
            margin: 0 0 20px 0;
            border: 2px solid var(--success);
            font-weight: bold;
        }

        .result-box span {
            color: var(--danger);
            font-size: 1.2em;
        }

        /* 月曆樣式 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-name {
            text-align: center;
            font-weight: bold;
            background: var(--primary);
            color: white;
            padding: 8px 0;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .calendar-cell {
            background: #fff;
            border: 1px solid #bdc3c7;
            height: 65px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 5px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .calendar-cell:hover {
            background: #e8f8f5;
            transform: translateY(-2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .calendar-cell.is-saturday {
            background: #fdfefe;
            border-color: #f8c471;
        }

        .calendar-cell.has-hours {
            background: #d4efdf;
            border-color: var(--success);
        }

        .calendar-cell.is-saturday.has-hours {
            background: var(--sat-bg);
            border-color: var(--sat-border);
        }

        .date-num {
            font-size: 1em;
            color: #555;
            font-weight: bold;
        }

        .is-saturday .date-num {
            color: #d35400;
        }

        .hours-badge {
            margin-top: auto;
            margin-bottom: 5px;
            font-size: 0.9em;
            font-weight: bold;
            color: #c0392b;
        }

        /* 浮動視窗 (Modal) 共用樣式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 320px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h3 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* 薪資與日期輸入表單 */
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* 時數加減器 */
        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 25px 0;
        }

        .stepper button {
            background: #ecf0f1;
            color: #333;
            border: 1px solid #bdc3c7;
            width: 50px;
            height: 50px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stepper button:active {
            background: #bdc3c7;
            transform: scale(0.95);
        }

        .stepper span {
            font-size: 28px;
            font-weight: bold;
            margin: 0 25px;
            min-width: 40px;
            text-align: center;
            color: var(--primary);
        }

        /* 視窗按鈕 */
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-confirm, .btn-cancel {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-confirm {
            background: var(--success);
            color: white;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
        }

        .clear-btn {
            width: 100%;
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* 行動裝置版面最佳化 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .top-controls { flex-direction: column; }
            .btn-setting, .calendar-header { width: 100%; box-sizing: border-box; }
            .calendar-cell { height: 55px; }
            .date-num { font-size: 0.9em; }
            .hours-badge { font-size: 0.8em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>加班費計算機</h2>
    
    <div class="result-box">
        本月預估加班費<br>
        <span id="totalOvertimePay">0</span> 元
    </div>

    <div class="top-controls">
        <button id="btnOpenSalaryModal" class="btn-setting">💰 設定薪資</button>
        <div class="calendar-header" id="monthYearDisplay"></div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        </div>

    <button class="clear-btn" id="btnClear">🗑️ 清除本月紀錄</button>
</div>

<div class="modal-overlay" id="salaryModal">
    <div class="modal-content">
        <h3>薪資設定</h3>
        <div class="form-group">
            <label for="baseSalary">本薪 (元)</label>
            <input type="number" id="baseSalary" value="30000" min="0" step="1000">
        </div>
        <div class="form-group">
            <label for="bonus">績效獎金 (元)</label>
            <input type="number" id="bonus" value="0" min="0" step="1000">
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancelSalary">取消</button>
            <button class="btn-confirm" id="btnConfirmSalary">儲存</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="dateModal">
    <div class="modal-content">
        <h3>選擇月份</h3>
        <div class="form-group">
            <label for="yearSelect">年份</label>
            <input type="number" id="yearSelect" min="2000" max="2100">
        </div>
        <div class="form-group">
            <label for="monthSelect">月份</label>
            <select id="monthSelect">
                <option value="0">1月</option>
                <option value="1">2月</option>
                <option value="2">3月</option>
                <option value="3">4月</option>
                <option value="4">5月</option>
                <option value="5">6月</option>
                <option value="6">7月</option>
                <option value="7">8月</option>
                <option value="8">9月</option>
                <option value="9">10月</option>
                <option value="10">11月</option>
                <option value="11">12月</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancelDate">取消</button>
            <button class="btn-confirm" id="btnConfirmDate">前往</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="hoursModal">
    <div class="modal-content">
        <h3 id="modalDateDisplay">填寫加班時數</h3>
        <p style="text-align:center; color:#7f8c8d; margin-top:-10px; font-size:14px;">(以 1 小時為單位)</p>
        <div class="stepper">
            <button id="btnMinus">-</button>
            <span id="currentHoursDisplay">0</span>
            <button id="btnPlus">+</button>
        </div>
        <div class="modal-actions">
            <button class="btn-confirm" id="btnConfirmHours" style="width:100%;">確認</button>
        </div>
    </div>
</div>

<script>
    // --- 狀態變數 ---
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth(); // 0-11
    let allOvertimeData = {}; // 存放所有月份資料: { "2026-2": { "1": 2, "15": 3 } }
    
    let baseSalary = 30000;
    let bonus = 0;

    let selectedDate = null;
    let tempHours = 0;

    // --- DOM 元素 ---
    const totalOvertimePayDisplay = document.getElementById('totalOvertimePay');
    const calendarGrid = document.getElementById('calendarGrid');
    const monthYearDisplay = document.getElementById('monthYearDisplay');
    
    // 薪資 Modal
    const salaryModal = document.getElementById('salaryModal');
    const baseSalaryInput = document.getElementById('baseSalary');
    const bonusInput = document.getElementById('bonus');
    
    // 日期 Modal
    const dateModal = document.getElementById('dateModal');
    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');

    // 時數 Modal
    const hoursModal = document.getElementById('hoursModal');
    const modalDateDisplay = document.getElementById('modalDateDisplay');
    const currentHoursDisplay = document.getElementById('currentHoursDisplay');

    // --- 儲存與讀取 (包含最佳化機制) ---
    function loadData() {
        const savedSalary = localStorage.getItem('ot_calc_baseSalary');
        if (savedSalary !== null) {
            baseSalary = parseFloat(savedSalary);
            baseSalaryInput.value = baseSalary;
        }

        const savedBonus = localStorage.getItem('ot_calc_bonus');
        if (savedBonus !== null) {
            bonus = parseFloat(savedBonus);
            bonusInput.value = bonus;
        }

        const savedData = localStorage.getItem('ot_calc_all_data');
        if (savedData !== null) {
            try {
                allOvertimeData = JSON.parse(savedData);
            } catch (e) {
                allOvertimeData = {};
            }
        }
    }

    function saveData() {
        localStorage.setItem('ot_calc_baseSalary', baseSalary);
        localStorage.setItem('ot_calc_bonus', bonus);
        localStorage.setItem('ot_calc_all_data', JSON.stringify(allOvertimeData));
    }

    function getCurrentMonthKey() {
        return `${currentYear}-${currentMonth}`;
    }

    function getMonthData() {
        const key = getCurrentMonthKey();
        if (!allOvertimeData[key]) {
            allOvertimeData[key] = {};
        }
        return allOvertimeData[key];
    }

    // --- 月曆繪製 ---
    function renderCalendar() {
        monthYearDisplay.textContent = `${currentYear} 年 ${currentMonth + 1} 月`;
        calendarGrid.innerHTML = `
            <div class="day-name" style="background:#e74c3c;">日</div>
            <div class="day-name">一</div>
            <div class="day-name">二</div>
            <div class="day-name">三</div>
            <div class="day-name">四</div>
            <div class="day-name">五</div>
            <div class="day-name" style="background:#f39c12;">六</div>
        `;

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        // 填補空白
        for (let i = 0; i < firstDay; i++) {
            const emptyCell = document.createElement('div');
            calendarGrid.appendChild(emptyCell);
        }

        const monthData = getMonthData();

        for (let i = 1; i <= daysInMonth; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            
            // 判斷是否為週六 (星期六 getDay() 為 6)
            const dayOfWeek = new Date(currentYear, currentMonth, i).getDay();
            if (dayOfWeek === 6) {
                cell.classList.add('is-saturday');
            }

            const dateNum = document.createElement('div');
            dateNum.className = 'date-num';
            dateNum.textContent = i;
            
            const hoursBadge = document.createElement('div');
            hoursBadge.className = 'hours-badge';
            
            // 繪製既有時數
            if (monthData[i]) {
                hoursBadge.textContent = `${monthData[i]} hr`;
                cell.classList.add('has-hours');
            }
            
            cell.appendChild(dateNum);
            cell.appendChild(hoursBadge);
            cell.addEventListener('click', () => openHoursModal(i));
            
            calendarGrid.appendChild(cell);
        }
    }

    // --- 計算邏輯 ---
    function calculatePay() {
        const hourlyWage = (baseSalary + bonus) / 240;
        let totalPay = 0;
        const monthData = getMonthData();

        for (const dateStr in monthData) {
            const date = parseInt(dateStr);
            const hours = monthData[date];
            
            if (hours > 0) {
                const dayOfWeek = new Date(currentYear, currentMonth, date).getDay();
                
                if (dayOfWeek === 6) {
                    // 需求：週六以全天兩倍計算
                    totalPay += hours * hourlyWage * 2;
                } else {
                    // 平日計算 (前兩小時 1.34，第三小時起 1.67)
                    if (hours <= 2) {
                        totalPay += hours * hourlyWage * 1.34;
                    } else {
                        totalPay += (2 * hourlyWage * 1.34) + ((hours - 2) * hourlyWage * 1.67);
                    }
                }
            }
        }

        totalOvertimePayDisplay.textContent = Math.round(totalPay).toLocaleString();
        saveData();
    }

    // --- 視窗控制邏輯 ---
    
    // 1. 薪資設定視窗
    document.getElementById('btnOpenSalaryModal').addEventListener('click', () => {
        baseSalaryInput.value = baseSalary;
        bonusInput.value = bonus;
        salaryModal.style.display = 'flex';
    });

    document.getElementById('btnCancelSalary').addEventListener('click', () => {
        salaryModal.style.display = 'none';
    });

    document.getElementById('btnConfirmSalary').addEventListener('click', () => {
        baseSalary = parseFloat(baseSalaryInput.value) || 0;
        bonus = parseFloat(bonusInput.value) || 0;
        salaryModal.style.display = 'none';
        calculatePay();
    });

    // 2. 年月選擇視窗
    monthYearDisplay.addEventListener('click', () => {
        yearSelect.value = currentYear;
        monthSelect.value = currentMonth;
        dateModal.style.display = 'flex';
    });

    document.getElementById('btnCancelDate').addEventListener('click', () => {
        dateModal.style.display = 'none';
    });

    document.getElementById('btnConfirmDate').addEventListener('click', () => {
        currentYear = parseInt(yearSelect.value);
        currentMonth = parseInt(monthSelect.value);
        dateModal.style.display = 'none';
        renderCalendar();
        calculatePay();
    });

    // 3. 時數填寫視窗
    function openHoursModal(date) {
        selectedDate = date;
        const monthData = getMonthData();
        tempHours = monthData[date] || 0;
        
        const dayOfWeek = new Date(currentYear, currentMonth, date).getDay();
        const satNote = (dayOfWeek === 6) ? ' <span style="color:#e67e22; font-size:0.8em;">(週六雙倍費率)</span>' : '';
        
        modalDateDisplay.innerHTML = `${currentMonth + 1}/${date} 加班時數${satNote}`;
        currentHoursDisplay.textContent = tempHours;
        hoursModal.style.display = 'flex';
    }

    document.getElementById('btnPlus').addEventListener('click', () => {
        tempHours += 1; // 修改為每次增加 1 小時
        currentHoursDisplay.textContent = tempHours;
    });

    document.getElementById('btnMinus').addEventListener('click', () => {
        if (tempHours >= 1) { // 最小單位 1 小時
            tempHours -= 1;
            currentHoursDisplay.textContent = tempHours;
        } else {
            tempHours = 0;
            currentHoursDisplay.textContent = tempHours;
        }
    });

    document.getElementById('btnConfirmHours').addEventListener('click', () => {
        const monthData = getMonthData();
        if (tempHours === 0) {
            delete monthData[selectedDate];
        } else {
            monthData[selectedDate] = tempHours;
        }
        hoursModal.style.display = 'none';
        renderCalendar();
        calculatePay();
    });

    // 點擊背景關閉所有視窗
    [salaryModal, dateModal, hoursModal].forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    });

    // 清除本月按鈕
    document.getElementById('btnClear').addEventListener('click', () => {
        if (confirm(`確定要清除 ${currentYear}年 ${currentMonth + 1}月 的所有加班紀錄嗎？\n(薪資設定不會被清除)`)) {
            const key = getCurrentMonthKey();
            delete allOvertimeData[key];
            renderCalendar();
            calculatePay();
        }
    });

    // --- 啟動初始化 ---
    loadData();
    renderCalendar();
    calculatePay();

</script>

</body>
</html>
